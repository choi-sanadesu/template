name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "38 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format-prettier:
    name: Format check Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Prettier
        run: npm install -g prettier
      - name: Check formatting
        run: prettier --check "**/*.{md,json,yml,yaml}"

  validate:
    name: Validate plugin
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: validate-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          find . -name "*.json" -not -path "./.git/*" | while read f; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f" || exit 1
          done

      - name: Check plugin manifest exists
        run: |
          test -f .claude-plugin/plugin.json && echo "OK: plugin.json found" || (echo "ERROR: .claude-plugin/plugin.json not found" && exit 1)

  label:
    name: Label
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v4
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

  stale:
    name: Stale
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "Stale issue message"
          stale-pr-message: "Stale pull request message"
          stale-issue-label: "no-issue-activity"
          stale-pr-label: "no-pr-activity"

  release-please:
    name: Release Please
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          release-type: simple
