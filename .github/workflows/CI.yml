name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "38 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: 'v1.2.3'
        required: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: validate-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown
        run: markdownlint "**/*.md" --ignore node_modules || true

      - name: Validate JSON
        run: |
          find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*" | while read f; do
            echo "Checking $f"
            python3 -m json.tool "$f" > /dev/null
          done

      - name: Validate YAML
        run: |
          pip install yamllint --quiet
          yamllint -d relaxed . || true

      - name: Check plugin manifest exists
        run: |
          test -f .claude-plugin/plugin.json && echo "OK: plugin.json found" || (echo "ERROR: .claude-plugin/plugin.json not found" && exit 1)

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Test placeholder
        run: echo "No tests defined yet. Add test steps when Python is introduced."

  label:
    name: Label
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v4
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

  stale:
    name: Stale
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "Stale issue message"
          stale-pr-message: "Stale pull request message"
          stale-issue-label: "no-issue-activity"
          stale-pr-label: "no-pr-activity"

  tag:
    name: Tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"
