name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.3)"
        required: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    concurrency:
      group: validate-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate JSON
        run: |
          python3 -c "
          import glob, json
          for f in glob.glob('**/*.json', recursive=True, include_hidden=True):
              if '/node_modules/' in f or '/.git/' in f: continue
              json.load(open(f))
              print('OK', f)
          "

      - name: Validate YAML
        run: |
          pip install pyyaml --quiet
          python3 -c "
          import glob, yaml
          for f in glob.glob('**/*.y*ml', recursive=True, include_hidden=True):
              if '/node_modules/' in f or '/.git/' in f: continue
              list(yaml.safe_load_all(open(f)))
              print('OK', f)
          "

      - name: Check plugin manifest exists
        run: test -f .claude-plugin/plugin.json

  label:
    name: Label
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  tag:
    name: Tag
    if: github.event_name == 'workflow_dispatch'
    needs: [validate]
    runs-on: ubuntu-latest
    concurrency:
      group: tag-${{ github.event.inputs.version }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

      - name: Update plugin.json version
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          python3 -c "
          import json, os
          path = '.claude-plugin/plugin.json'
          data = json.load(open(path))
          data['version'] = os.environ['VERSION'].lstrip('v')
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          HEADER="## ${VERSION} ($(date -u +%Y-%m-%d))"
          if [ -f CHANGELOG.md ]; then
            printf '%s\n\n%s\n' "$HEADER" "$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            printf '# Changelog\n\n%s\n' "$HEADER" > CHANGELOG.md
          fi

      - name: Commit and tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json CHANGELOG.md
          git commit -m "chore: release ${VERSION}"
          git tag "$VERSION"
          git push origin HEAD "$VERSION"
